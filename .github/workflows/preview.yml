name: Preview PDF

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-preview:
    runs-on: ubuntu-latest

    concurrency:
      group: preview-${{ github.ref }}
      cancel-in-progress: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      - name: Build PDF
        run: pnpm vivliostyle build -o 幻协生存指南.pdf

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: preview-pdf
          path: 幻协生存指南.pdf
          retention-days: 3
