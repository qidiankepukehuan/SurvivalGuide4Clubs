name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Build PDF
        run: pnpm vivliostyle build -o 幻协生存指南.pdf

      - name: Build EPUB
        run: pnpm vivliostyle build -o 幻协生存指南.epub

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            幻协生存指南.pdf
            幻协生存指南.epub
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
